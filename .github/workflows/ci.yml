name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  checks:
    name: Lint · Build · Unit tests · Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test:unit

      - name: Security audit (high+)
        # Fails on high or critical vulnerabilities.
        # If a false positive blocks CI, document the exception in docs/CONVENTIONS.md
        # and override with: npm audit --audit-level=high --ignore-scripts
        run: npm audit --audit-level=high

  # ──────────────────────────────────────────────────────────────────────────
  # T-005: V2 quality gates — bundle check + Lighthouse CI
  # Runs after the main checks job (build artefact already validated there).
  # Does NOT replace the existing checks job; it extends CI with V2-specific
  # budgets aligned with the PRD:
  #   LCP  ≤ 2500 ms | CLS ≤ 0.1 | INP ≤ 200 ms | JS initial ≤ 300 KB gzip
  # ──────────────────────────────────────────────────────────────────────────
  v2-bundle-check:
    name: V2 · Bundle budget check (JS initial ≤ 300 KB gzip)
    runs-on: ubuntu-latest
    needs: checks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run bundle check
        # scripts/bundle-check.cjs exits 1 if initial JS gzip > 300 KB.
        # Output is printed regardless of pass/fail for full visibility.
        run: npm run bundle:check

      - name: Upload dist as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dist-v2-bundle
          path: |
            dist/index.v2.html
            dist/assets/v2-*.js
            dist/assets/client-*.js
          retention-days: 7

  v2-lighthouse:
    name: V2 · Lighthouse CI (mobile performance / a11y / SEO)
    runs-on: ubuntu-latest
    needs: checks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Lighthouse CI
        # Uses .lighthouserc.cjs — serves dist/ statically and audits index.v2.html.
        # Assertions defined in config: Performance ≥ 85, A11y ≥ 95, SEO ≥ 95.
        # LCP ≤ 2500 ms, CLS ≤ 0.1, INP ≤ 200 ms (warn).
        run: npx lhci autorun --config=.lighthouserc.cjs
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports-v2
          path: .lighthouseci/
          retention-days: 14

  e2e:
    name: E2E (Chromium desktop + mobile)
    runs-on: ubuntu-latest
    needs: checks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers + system deps
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
