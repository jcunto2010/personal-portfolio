name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  checks:
    name: Lint · Build · Unit tests · Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test:unit

      - name: Security audit (high+)
        # Fails on high or critical vulnerabilities.
        # If a false positive blocks CI, document the exception in docs/CONVENTIONS.md
        # and override with: npm audit --audit-level=high --ignore-scripts
        run: npm audit --audit-level=high

  e2e:
    name: E2E (Chromium desktop + mobile)
    runs-on: ubuntu-latest
    needs: checks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers + system deps
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
