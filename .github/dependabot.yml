version: 2

updates:
  # npm dependencies
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: America/Lima
    open-pull-requests-limit: 10
    groups:
      # Minor and patch updates batched into a single PR
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Major version bumps are reviewed manually
      - dependency-name: '*'
        update-types:
          - version-update:semver-major

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: America/Lima
    open-pull-requests-limit: 5
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
