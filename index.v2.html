<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Content Security Policy — T-007
         'unsafe-eval' is required by Three.js/WebGL shader compilation (GLSL).
         'blob:' covers R3F worker URLs.
         No external CDNs, analytics or service workers are active in this phase.
         Tighten further (remove unsafe-eval) once GLSL shaders are pre-compiled. -->
    <meta http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src  'self' 'unsafe-inline' 'unsafe-eval' blob:;
        style-src   'self' 'unsafe-inline';
        img-src     'self' data: blob:;
        connect-src 'self';
        font-src    'self';
        worker-src  'self' blob:;
        frame-src   'none';
        object-src  'none';
        base-uri    'self';
        form-action 'self';
      " />

    <!-- Primary SEO -->
    <title>Jonathan Cunto Díaz — Frontend Developer & Portfolio</title>
    <meta name="description" content="Jonathan Cunto Díaz — Frontend Developer specialising in React, Flutter, and TypeScript. Building products at the intersection of design and code." />
    <meta name="author" content="Jonathan Cunto Díaz" />
    <meta name="robots" content="index, follow" />

    <!-- Canonical -->
    <link rel="canonical" href="https://www.jonathancuntodiaz.com" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Jonathan Cunto Díaz" />
    <meta property="og:title" content="Jonathan Cunto Díaz — Frontend Developer" />
    <meta property="og:description" content="Frontend Developer specialising in React, Flutter, and TypeScript. Building products at the intersection of design and code." />
    <meta property="og:url" content="https://www.jonathancuntodiaz.com" />
    <meta property="og:image" content="https://www.jonathancuntodiaz.com/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Jonathan Cunto Díaz — Frontend Developer" />
    <meta name="twitter:description" content="Frontend Developer specialising in React, Flutter, and TypeScript." />
    <meta name="twitter:image" content="https://www.jonathancuntodiaz.com/og-image.png" />
  </head>
  <body>
    <div id="root"></div>

  </body>
</html>
